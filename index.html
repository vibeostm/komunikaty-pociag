  <!-- WAŻNE: jawny https (unikasz mixed-content) -->
  <script data-goatcounter="https://komunikaty.goatcounter.com/count"
          async src="https://gc.zgo.at/count.js"></script>

  <script>
    // === Stałe do edycji ===
    const CREATED = "2026-01-14";
    const VERSION = "v1.2.0";
    document.getElementById("createdDate").textContent = CREATED;
    document.getElementById("appVersion").textContent = VERSION;

    // === GoatCounter (liczniki) ===
    // Jeśli fetch nie zadziała (np. adblock/CORS), pokaż ostatnie znane wartości z localStorage.
    const GC = "https://komunikaty.goatcounter.com";
    const KEY = "gc_counts_cache_v1";

    function ymd(d) {
      const pad = (n) => String(n).padStart(2, "0");
      return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function loadCache() {
      try { return JSON.parse(localStorage.getItem(KEY) || "null"); }
      catch { return null; }
    }

    function saveCache(obj) {
      try { localStorage.setItem(KEY, JSON.stringify(obj)); } catch {}
    }

    async function gcCount(path, start=null, end=null) {
      // counter endpoint (publiczny) — cache-buster żeby odświeżało przy każdym reloadzie
      const p = encodeURIComponent(path);
      let url = `${GC}/counter/${p}.json`;
      const qs = [];
      if (start) qs.push(`start=${encodeURIComponent(start)}`);
      if (end)   qs.push(`end=${encodeURIComponent(end)}`);
      qs.push(`_=${Date.now()}`);
      url += `?${qs.join("&")}`;

      const r = await fetch(url, { cache: "no-store", mode: "cors" });
      if (!r.ok) throw new Error("GoatCounter HTTP " + r.status);
      const data = await r.json();
      return data.count;
    }

    (async () => {
      // 1) pokaż cache natychmiast (żeby zawsze coś było “po odświeżeniu”)
      const cached = loadCache();
      if (cached && typeof cached === "object") {
        if (cached.total != null) setText("gc-total", cached.total);
        if (cached.today != null) setText("gc-today", cached.today);
        if (cached.d7 != null) setText("gc-7d", cached.d7);
      }

      // 2) spróbuj pobrać świeże dane
      try {
        const today = new Date();
        const startToday = ymd(today);

        const d7 = new Date(today);
        d7.setDate(d7.getDate() - 7);

        const total = await gcCount("TOTAL");
        const todayCount = await gcCount("TOTAL", startToday);
        const d7Count = await gcCount("TOTAL", ymd(d7));

        setText("gc-total", total);
        setText("gc-today", todayCount);
        setText("gc-7d", d7Count);

        saveCache({ total, today: todayCount, d7: d7Count, ts: Date.now() });
      } catch (e) {
        console.warn("GoatCounter counter failed:", e);
        // jeśli brak cache i fetch padł:
        const cached2 = loadCache();
        if (!cached2) {
          setText("gc-total", "–");
          setText("gc-today", "–");
          setText("gc-7d", "–");
        }
      }
    })();
  </script>
