<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="style.css">

  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#0f172a">
</head>

<body class="app">

  <!-- NAGŁÓWEK (logo wycentrowane) -->

    <div class="topbar__inner topbar__inner--logo">
      <img class="topbar__logo" src="logo.webp" alt="m.komunikaty">
    </div>
  </header>

  <!-- Zawartość -->
  <main class="app__content">
    <div class="tabs">
      <div id="tabPL" class="tab active">🇵🇱 Polski</div>
      <div id="tabEN" class="tab">🇬🇧 English</div>
    </div>

    <div class="accordion-container">

      <div id="sectionPL" class="section active">
        <div data-load="pl/komunikat1.html"></div>
        <div data-load="pl/komunikat2.html"></div>
        <div data-load="pl/komunikat3.html"></div>
        <div data-load="pl/komunikat4.html"></div>
        <div data-load="pl/komunikat5.html"></div>
        <div data-load="pl/komunikat6.html"></div>
        <div data-load="pl/komunikat7.html"></div>
        <div data-load="pl/komunikat8.html"></div>
        <div data-load="pl/komunikat9.html"></div>
        <div data-load="pl/uwaga.html"></div>
      </div>

      <div id="sectionEN" class="section">
        <div data-load="en/announcement1.html"></div>
        <div data-load="en/announcement2.html"></div>
        <div data-load="en/announcement3.html"></div>
        <div data-load="en/announcement4.html"></div>
        <div data-load="en/announcement5.html"></div>
        <div data-load="en/announcement6.html"></div>
        <div data-load="en/announcement7.html"></div>
        <div data-load="en/announcement8.html"></div>
        <div data-load="en/announcement9.html"></div>
        <div data-load="en/note.html"></div>
      </div>

    </div>
  </main>

  <!-- STOPKA -->
  <footer class="footerbar" id="gc-footer">
    <div class="footerbar__inner">

      <div class="footerbar__meta" aria-label="Informacje o wersji">
        <span class="footerbar__metaName">m.komunikaty</span>
        <span class="footerbar__dot" aria-hidden="true">•</span>
        <span>powered by ab: <strong id="createdDate">2026-01-14</strong></span>
        <span class="footerbar__dot" aria-hidden="true">•</span>
        <span>Wersja: <strong id="appVersion">v1.2.0</strong></span>
      </div>

      <div class="footerbar__counters" aria-label="Statystyki odsłon">
        <span class="chip chip--soft">Odsłony: łącznie <strong id="gc-total">–</strong></span>
        <span class="chip chip--soft">dziś <strong id="gc-today">–</strong></span>
        <span class="chip chip--soft">ostatnie 7 dni <strong id="gc-7d">–</strong></span>
      </div>

    </div>
  </footer>

  <!-- PŁYWAJĄCY PRZEŁĄCZNIK JĘZYKA (PL/EN) -->
  <button id="langFab" class="lang-fab" type="button" aria-label="Przełącz język">EN</button>

  <script src="script.js"></script>

  <script data-goatcounter="https://komunikaty.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <script>
    // === Stałe do edycji ===
    const CREATED = "2026-01-14";
    const VERSION = "v1.2.0";

    document.getElementById("createdDate").textContent = CREATED;
    document.getElementById("appVersion").textContent = VERSION;

    // === GoatCounter: zawsze pokazuj liczby po odświeżeniu ===
    const GC = "https://komunikaty.goatcounter.com";
    const LS_KEY = "gc_counts_v1";

    function ymd(d) {
      const pad = (n) => String(n).padStart(2, "0");
      return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
    }

    function setText(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = (val ?? "–");
    }

    // 1) NATYCHMIAST: pokaż ostatnie znane wartości (localStorage)
    try {
      const cached = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
      setText("gc-total", cached.total);
      setText("gc-today", cached.today);
      setText("gc-7d", cached.d7);
    } catch (_) {}

    async function gcCount(path, start=null, end=null) {
      const p = encodeURIComponent(path);
      let url = `${GC}/counter/${p}.json`;
      const qs = [];
      if (start) qs.push(`start=${encodeURIComponent(start)}`);
      if (end)   qs.push(`end=${encodeURIComponent(end)}`);
      qs.push(`_=${Date.now()}`); // cache-buster
      url += `?${qs.join("&")}`;

      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 5000);

      try {
        const r = await fetch(url, {
          cache: "no-store",
          mode: "cors",
          credentials: "omit",
          signal: ctrl.signal
        });
        if (!r.ok) throw new Error("GoatCounter HTTP " + r.status);
        const data = await r.json();
        return data.count;
      } finally {
        clearTimeout(t);
      }
    }

    async function refreshCounters() {
      const today = new Date();
      const startToday = ymd(today);

      const d7 = new Date(today);
      d7.setDate(d7.getDate() - 7);

      async function try2(fn){
        try { return await fn(); }
        catch (e1) { return await fn(); }
      }

      const total = await try2(() => gcCount("TOTAL"));
      const todayCount = await try2(() => gcCount("TOTAL", startToday));
      const d7Count = await try2(() => gcCount("TOTAL", ymd(d7)));

      setText("gc-total", total);
      setText("gc-today", todayCount);
      setText("gc-7d", d7Count);

      localStorage.setItem(LS_KEY, JSON.stringify({
        total,
        today: todayCount,
        d7: d7Count,
        ts: Date.now()
      }));
    }

    refreshCounters().catch((e) => {
      console.warn("GoatCounter counter failed:", e);
      // zostają wartości z localStorage
    });
  </script>

</body>
</html>
